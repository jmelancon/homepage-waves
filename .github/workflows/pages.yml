name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add Pandoc Dependencies
        run: sudo apt-get install -y pandoc texlive

      - name: Build Resume
        run: pandoc -i assets/resume.md -o assets/resume.pdf

      - name: Set Last-Modified in Sitemap
        run: sed -i "s/1970-01-01/$(date --utc +%Y-%m-%d)/g" sitemap.xml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
